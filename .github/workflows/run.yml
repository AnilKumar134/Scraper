name: Scraper Automation

on:
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    # Prevent overlapping runs
    concurrency:
      group: scraper-automation
      cancel-in-progress: false

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run NEW videos script
      - name: Run New Videos Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python New_vedios.py

      # 5. Small delay (API safety)
      - name: Wait before next script
        run: sleep 10

      # 6. Run OLD videos script
      - name: Run Old Videos Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python Old_vedios.py

      # 7. Commit and push safely
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "auto update scraper data"
          git push
